<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 210" width="620" height="210">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Left: input collection -->
  <rect x="10" y="10" width="210" height="185" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="115" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">List</text>

  <rect x="25" y="42" width="180" height="28" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="115" y="61" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample1</text>
  <text x="195" y="61" text-anchor="end" font-family="sans-serif" font-size="9" fill="#2e7d32">ok</text>

  <!-- Null element (highlighted gray/dashed) -->
  <rect x="25" y="78" width="180" height="28" rx="4" ry="4" fill="#f0f0f0" stroke="#999" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="115" y="97" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#999">sample2</text>
  <text x="195" y="97" text-anchor="end" font-family="sans-serif" font-size="9" fill="#999">null</text>

  <rect x="25" y="114" width="180" height="28" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="115" y="133" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample3</text>
  <text x="195" y="133" text-anchor="end" font-family="sans-serif" font-size="9" fill="#2e7d32">ok</text>

  <text x="115" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#999">sample2 is null</text>

  <!-- Arrow -->
  <line x1="240" y1="92" x2="360" y2="92" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="300" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Filter</text>

  <!-- Right: filtered collection -->
  <rect x="380" y="10" width="220" height="155" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="490" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">List (filtered)</text>

  <rect x="395" y="42" width="190" height="28" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="490" y="61" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample1</text>

  <rect x="395" y="78" width="190" height="28" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="490" y="97" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample3</text>

  <text x="490" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">null element removed</text>

</svg>
