<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Input Collection 1 -->
  <rect x="10" y="10" width="190" height="105" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="105" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Collection 1</text>

  <rect x="22" y="36" width="166" height="26" rx="4" ry="4" fill="#fef3e2" stroke="#d4760a" stroke-width="0.7"/>
  <text x="105" y="54" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d4760a">sampleA</text>

  <rect x="22" y="68" width="166" height="26" rx="4" ry="4" fill="#fef3e2" stroke="#d4760a" stroke-width="0.7"/>
  <text x="105" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d4760a">sampleB</text>

  <!-- Input Collection 2 -->
  <rect x="10" y="135" width="190" height="105" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="105" y="153" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Collection 2</text>

  <rect x="22" y="161" width="166" height="26" rx="4" ry="4" fill="#f0e8f5" stroke="#7b4fa0" stroke-width="0.7"/>
  <text x="105" y="179" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7b4fa0">sampleC</text>

  <rect x="22" y="193" width="166" height="26" rx="4" ry="4" fill="#f0e8f5" stroke="#7b4fa0" stroke-width="0.7"/>
  <text x="105" y="211" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7b4fa0">sampleD</text>

  <!-- Arrow -->
  <line x1="215" y1="130" x2="430" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="323" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Merge</text>

  <!-- Output: merged collection -->
  <rect x="450" y="10" width="210" height="240" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="555" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Merged collection</text>

  <rect x="462" y="36" width="186" height="26" rx="4" ry="4" fill="#fef3e2" stroke="#d4760a" stroke-width="0.7"/>
  <text x="555" y="54" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d4760a">sampleA</text>

  <rect x="462" y="68" width="186" height="26" rx="4" ry="4" fill="#fef3e2" stroke="#d4760a" stroke-width="0.7"/>
  <text x="555" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#d4760a">sampleB</text>

  <rect x="462" y="100" width="186" height="26" rx="4" ry="4" fill="#f0e8f5" stroke="#7b4fa0" stroke-width="0.7"/>
  <text x="555" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7b4fa0">sampleC</text>

  <rect x="462" y="132" width="186" height="26" rx="4" ry="4" fill="#f0e8f5" stroke="#7b4fa0" stroke-width="0.7"/>
  <text x="555" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7b4fa0">sampleD</text>

  <text x="555" y="195" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">elements concatenated in order</text>

</svg>
