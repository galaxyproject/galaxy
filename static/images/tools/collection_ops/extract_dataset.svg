<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 475" width="800" height="475">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- ==================== CASE A ==================== -->
  <!-- Flat list → single dataset -->

  <!-- Case label -->
  <circle cx="22" cy="90" r="14" fill="#555"/>
  <text x="22" y="95" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">A</text>

  <!-- Left: List collection -->
  <rect x="50" y="10" width="220" height="170" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">List</text>

  <rect x="65" y="42" width="190" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="75" y="60" font-family="sans-serif" font-size="10" fill="#999">0</text>
  <text x="160" y="60" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">control</text>

  <!-- Highlighted element -->
  <rect x="65" y="74" width="190" height="26" rx="4" ry="4" fill="#fff3cd" stroke="#e6a817" stroke-width="1.2"/>
  <text x="75" y="92" font-family="sans-serif" font-size="10" fill="#999">1</text>
  <text x="160" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#333">treated</text>

  <rect x="65" y="106" width="190" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="75" y="124" font-family="sans-serif" font-size="10" fill="#999">2</text>
  <text x="160" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">reference</text>

  <text x="160" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#b45309">identifier = "treated"</text>

  <!-- Arrow -->
  <line x1="290" y1="88" x2="400" y2="88" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="345" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Extract</text>

  <!-- Right: single dataset -->
  <rect x="420" y="70" width="200" height="36" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7" filter="url(#shadow)"/>
  <text x="520" y="93" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333">treated</text>

  <text x="520" y="128" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">standalone dataset in history</text>

  <!-- ==================== SEPARATOR ==================== -->
  <line x1="10" y1="195" x2="790" y2="195" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ==================== CASE B ==================== -->
  <!-- Nested list:list → flat list (maps over outer, extracts from each inner) -->

  <!-- Case label -->
  <circle cx="22" cy="340" r="14" fill="#555"/>
  <text x="22" y="345" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">B</text>

  <!-- Left: Nested list collection -->
  <rect x="50" y="210" width="245" height="248" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="172" y="230" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">Nested list</text>

  <!-- Inner collection 1: sampleA -->
  <rect x="65" y="240" width="215" height="90" rx="6" ry="6" fill="#e8f0e3" stroke="#aaa" stroke-width="0.7"/>
  <text x="75" y="255" font-family="sans-serif" font-size="10" font-weight="bold" fill="#555">sampleA</text>

  <rect x="75" y="260" width="195" height="18" rx="3" ry="3" fill="#fff" stroke="#bbb" stroke-width="0.5"/>
  <text x="83" y="273" font-family="sans-serif" font-size="9" fill="#999">0</text>
  <text x="172" y="273" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">Dataset 1</text>

  <!-- Highlighted in inner 1 -->
  <rect x="75" y="284" width="195" height="18" rx="3" ry="3" fill="#fff3cd" stroke="#e6a817" stroke-width="1"/>
  <text x="83" y="297" font-family="sans-serif" font-size="9" fill="#999">1</text>
  <text x="172" y="297" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">Dataset 2</text>

  <rect x="75" y="308" width="195" height="18" rx="3" ry="3" fill="#fff" stroke="#bbb" stroke-width="0.5"/>
  <text x="83" y="321" font-family="sans-serif" font-size="9" fill="#999">2</text>
  <text x="172" y="321" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">Dataset 3</text>

  <!-- Inner collection 2: sampleB -->
  <rect x="65" y="340" width="215" height="90" rx="6" ry="6" fill="#e8f0e3" stroke="#aaa" stroke-width="0.7"/>
  <text x="75" y="355" font-family="sans-serif" font-size="10" font-weight="bold" fill="#555">sampleB</text>

  <rect x="75" y="360" width="195" height="18" rx="3" ry="3" fill="#fff" stroke="#bbb" stroke-width="0.5"/>
  <text x="83" y="373" font-family="sans-serif" font-size="9" fill="#999">0</text>
  <text x="172" y="373" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">Dataset A</text>

  <!-- Highlighted in inner 2 -->
  <rect x="75" y="384" width="195" height="18" rx="3" ry="3" fill="#fff3cd" stroke="#e6a817" stroke-width="1"/>
  <text x="83" y="397" font-family="sans-serif" font-size="9" fill="#999">1</text>
  <text x="172" y="397" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#333">Dataset B</text>

  <rect x="75" y="408" width="195" height="18" rx="3" ry="3" fill="#fff" stroke="#bbb" stroke-width="0.5"/>
  <text x="83" y="421" font-family="sans-serif" font-size="9" fill="#999">2</text>
  <text x="172" y="421" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">Dataset C</text>

  <!-- Selection label -->
  <text x="172" y="450" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#b45309">index = 1</text>

  <!-- Arrow -->
  <line x1="315" y1="340" x2="415" y2="340" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="365" y="330" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Extract</text>

  <!-- Right: flat list (one level removed) -->
  <rect x="435" y="290" width="230" height="105" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="550" y="310" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">List</text>

  <rect x="450" y="320" width="200" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="550" y="338" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset 2</text>
  <text x="460" y="338" font-family="sans-serif" font-size="10" font-weight="bold" fill="#555">sampleA</text>

  <rect x="450" y="354" width="200" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="550" y="372" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset B</text>
  <text x="460" y="372" font-family="sans-serif" font-size="10" font-weight="bold" fill="#555">sampleB</text>

  <text x="550" y="412" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">one nesting level removed</text>

</svg>
