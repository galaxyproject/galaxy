<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 310" width="680" height="310">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Left: Input Collection 1 (reference order) -->
  <rect x="10" y="10" width="200" height="135" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Collection 1</text>

  <rect x="22" y="36" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="110" y="54" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleA</text>

  <rect x="22" y="68" width="176" height="26" rx="4" ry="4" fill="#f0f0f0" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="110" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">sampleB</text>
  <text x="192" y="86" text-anchor="end" font-family="sans-serif" font-size="8" fill="#999">only here</text>

  <rect x="22" y="100" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="110" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleC</text>

  <!-- Left: Input Collection 2 (different order) -->
  <rect x="10" y="165" width="200" height="135" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="183" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Collection 2</text>

  <rect x="22" y="191" width="176" height="26" rx="4" ry="4" fill="#f0f0f0" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="110" y="209" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999">sampleD</text>
  <text x="192" y="209" text-anchor="end" font-family="sans-serif" font-size="8" fill="#999">only here</text>

  <rect x="22" y="223" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="110" y="241" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleC</text>

  <rect x="22" y="255" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="110" y="273" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleA</text>

  <!-- Arrow -->
  <line x1="225" y1="155" x2="440" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="333" y="145" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Harmonize</text>
  <text x="333" y="173" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">keep shared, match order</text>

  <!-- Right: Output Collection 1 -->
  <rect x="460" y="10" width="200" height="105" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Output 1</text>

  <rect x="472" y="36" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="560" y="54" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleA</text>

  <rect x="472" y="68" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="560" y="86" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleC</text>

  <!-- Right: Output Collection 2 -->
  <rect x="460" y="165" width="200" height="105" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="183" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">Output 2</text>

  <rect x="472" y="191" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="560" y="209" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleA</text>

  <rect x="472" y="223" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="560" y="241" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleC</text>

  <!-- Annotations -->
  <text x="560" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">same identifiers, same order</text>

</svg>
