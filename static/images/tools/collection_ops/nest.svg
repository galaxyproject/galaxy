<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" width="620" height="260">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Left: flat list -->
  <rect x="10" y="10" width="180" height="145" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="100" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">List</text>

  <rect x="22" y="38" width="156" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="100" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample1</text>

  <rect x="22" y="70" width="156" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="100" y="88" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample2</text>

  <rect x="22" y="102" width="156" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="100" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample3</text>

  <!-- Arrow -->
  <line x1="205" y1="130" x2="330" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="268" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Nest</text>

  <!-- Right: nested list:list -->
  <rect x="345" y="10" width="260" height="240" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="475" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">Nested list</text>

  <!-- Inner list: sample1 -->
  <rect x="357" y="38" width="236" height="56" rx="6" ry="6" fill="#e8f0e3" stroke="#aaa" stroke-width="0.7"/>
  <text x="385" y="54" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">sample1</text>

  <rect x="369" y="60" width="212" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="475" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample1</text>

  <!-- Inner list: sample2 -->
  <rect x="357" y="102" width="236" height="56" rx="6" ry="6" fill="#e8f0e3" stroke="#aaa" stroke-width="0.7"/>
  <text x="385" y="118" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">sample2</text>

  <rect x="369" y="124" width="212" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="475" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample2</text>

  <!-- Inner list: sample3 -->
  <rect x="357" y="166" width="236" height="56" rx="6" ry="6" fill="#e8f0e3" stroke="#aaa" stroke-width="0.7"/>
  <text x="385" y="182" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">sample3</text>

  <rect x="369" y="188" width="212" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="475" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">sample3</text>

  <text x="475" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">each element wrapped in its own list</text>

</svg>
