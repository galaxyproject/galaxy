<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 260" width="620" height="260">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Left: nested list:paired collection -->
  <rect x="10" y="10" width="230" height="240" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="125" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">list : paired</text>

  <!-- Inner pair: sample1 -->
  <rect x="22" y="40" width="206" height="90" rx="6" ry="6" fill="#e8f0e3" stroke="#aaa" stroke-width="0.7"/>
  <text x="125" y="56" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">sample1</text>

  <rect x="34" y="62" width="182" height="26" rx="4" ry="4" fill="#fef3e2" stroke="#d4760a" stroke-width="0.7"/>
  <text x="125" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#d4760a">forward</text>

  <rect x="34" y="94" width="182" height="26" rx="4" ry="4" fill="#f0e8f5" stroke="#7b4fa0" stroke-width="0.7"/>
  <text x="125" y="112" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7b4fa0">reverse</text>

  <!-- Inner pair: sample2 -->
  <rect x="22" y="140" width="206" height="90" rx="6" ry="6" fill="#e8f0e3" stroke="#aaa" stroke-width="0.7"/>
  <text x="125" y="156" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">sample2</text>

  <rect x="34" y="162" width="182" height="26" rx="4" ry="4" fill="#fef3e2" stroke="#d4760a" stroke-width="0.7"/>
  <text x="125" y="180" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#d4760a">forward</text>

  <rect x="34" y="194" width="182" height="26" rx="4" ry="4" fill="#f0e8f5" stroke="#7b4fa0" stroke-width="0.7"/>
  <text x="125" y="212" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7b4fa0">reverse</text>

  <!-- Arrow -->
  <line x1="255" y1="130" x2="365" y2="130" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="310" y="120" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Flatten</text>
  <text x="310" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">join with "_"</text>

  <!-- Right: flat list -->
  <rect x="380" y="10" width="230" height="240" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="495" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">List (flattened)</text>

  <rect x="395" y="44" width="200" height="28" rx="4" ry="4" fill="#fef3e2" stroke="#d4760a" stroke-width="0.7"/>
  <text x="495" y="63" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#d4760a">sample1_forward</text>

  <rect x="395" y="80" width="200" height="28" rx="4" ry="4" fill="#f0e8f5" stroke="#7b4fa0" stroke-width="0.7"/>
  <text x="495" y="99" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7b4fa0">sample1_reverse</text>

  <rect x="395" y="116" width="200" height="28" rx="4" ry="4" fill="#fef3e2" stroke="#d4760a" stroke-width="0.7"/>
  <text x="495" y="135" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#d4760a">sample2_forward</text>

  <rect x="395" y="152" width="200" height="28" rx="4" ry="4" fill="#f0e8f5" stroke="#7b4fa0" stroke-width="0.7"/>
  <text x="495" y="171" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7b4fa0">sample2_reverse</text>

  <text x="495" y="215" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">hierarchy removed, identifiers joined</text>

</svg>
