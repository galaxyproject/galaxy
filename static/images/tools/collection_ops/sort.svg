<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" width="620" height="180">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Left: unsorted collection -->
  <rect x="10" y="10" width="190" height="155" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="105" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">List</text>

  <rect x="22" y="38" width="166" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="105" y="56" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleC</text>

  <rect x="22" y="70" width="166" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="105" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleA</text>

  <rect x="22" y="102" width="166" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="105" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleB</text>

  <text x="105" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#999">unsorted</text>

  <!-- Arrow -->
  <line x1="215" y1="85" x2="385" y2="85" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="300" y="75" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Sort</text>
  <text x="300" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">alphabetical</text>

  <!-- Right: sorted collection -->
  <rect x="400" y="10" width="200" height="155" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="28" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333">List (sorted)</text>

  <rect x="412" y="38" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="500" y="56" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleA</text>

  <rect x="412" y="70" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="500" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleB</text>

  <rect x="412" y="102" width="176" height="26" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="500" y="120" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">sampleC</text>

  <text x="500" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#666">A, B, C order</text>

</svg>
