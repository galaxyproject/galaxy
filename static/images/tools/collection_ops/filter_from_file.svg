<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" width="800" height="530">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- ==================== CASE A ==================== -->
  <!-- Remove if ABSENT from file (keep listed) -->

  <!-- Case label -->
  <circle cx="22" cy="100" r="14" fill="#555"/>
  <text x="22" y="105" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">A</text>

  <!-- Left: input collection -->
  <rect x="50" y="10" width="170" height="130" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="135" y="30" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">List</text>

  <rect x="62" y="40" width="146" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="135" y="57" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset A</text>

  <rect x="62" y="70" width="146" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="135" y="87" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset B</text>

  <rect x="62" y="100" width="146" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="135" y="117" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset X</text>

  <!-- Left: text file -->
  <rect x="50" y="155" width="170" height="72" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7" filter="url(#shadow)"/>
  <text x="135" y="172" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#666">identifiers.txt</text>
  <text x="100" y="190" font-family="monospace" font-size="10" fill="#333">A</text>
  <text x="100" y="202" font-family="monospace" font-size="10" fill="#333">B</text>
  <text x="100" y="214" font-family="monospace" font-size="10" fill="#333">Z</text>

  <!-- Mode label -->
  <text x="135" y="245" text-anchor="middle" font-family="sans-serif" font-size="9" font-style="italic" fill="#b45309">remove if ABSENT</text>

  <!-- Arrow -->
  <line x1="240" y1="100" x2="340" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="290" y="90" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Filter</text>

  <!-- Right: filtered output -->
  <rect x="360" y="10" width="195" height="98" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="457" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">(filtered)</text>

  <rect x="375" y="40" width="165" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="457" y="57" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset A</text>

  <rect x="375" y="70" width="165" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="457" y="87" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset B</text>

  <!-- Right: discarded output -->
  <rect x="580" y="10" width="195" height="68" rx="8" ry="8" fill="#fce8e6" stroke="#c0392b" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="677" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b">(discarded)</text>

  <rect x="595" y="40" width="165" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="677" y="57" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset X</text>

  <!-- Note about Z -->
  <text x="677" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#999">Z has no match — ignored</text>

  <!-- ==================== SEPARATOR ==================== -->
  <line x1="10" y1="258" x2="790" y2="258" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ==================== CASE B ==================== -->
  <!-- Remove if PRESENT in file (remove listed) -->

  <!-- Case label -->
  <circle cx="22" cy="373" r="14" fill="#555"/>
  <text x="22" y="378" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff">B</text>

  <!-- Left: input collection -->
  <rect x="50" y="281" width="170" height="130" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="135" y="301" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333">List</text>

  <rect x="62" y="311" width="146" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="135" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset A</text>

  <rect x="62" y="341" width="146" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="135" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset B</text>

  <rect x="62" y="371" width="146" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="135" y="388" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset X</text>

  <!-- Left: text file -->
  <rect x="50" y="426" width="170" height="72" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7" filter="url(#shadow)"/>
  <text x="135" y="443" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#666">identifiers.txt</text>
  <text x="100" y="461" font-family="monospace" font-size="10" fill="#333">A</text>
  <text x="100" y="473" font-family="monospace" font-size="10" fill="#333">B</text>
  <text x="100" y="485" font-family="monospace" font-size="10" fill="#333">Z</text>

  <!-- Mode label -->
  <text x="135" y="516" text-anchor="middle" font-family="sans-serif" font-size="9" font-style="italic" fill="#b45309">remove if PRESENT</text>

  <!-- Arrow -->
  <line x1="240" y1="373" x2="340" y2="373" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="290" y="363" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#555">Filter</text>

  <!-- Right: filtered output -->
  <rect x="360" y="281" width="195" height="68" rx="8" ry="8" fill="#d9ead3" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="457" y="301" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32">(filtered)</text>

  <rect x="375" y="311" width="165" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="457" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset X</text>

  <!-- Right: discarded output -->
  <rect x="580" y="281" width="195" height="98" rx="8" ry="8" fill="#fce8e6" stroke="#c0392b" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="677" y="301" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#c0392b">(discarded)</text>

  <rect x="595" y="311" width="165" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="677" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset A</text>

  <rect x="595" y="341" width="165" height="24" rx="4" ry="4" fill="#fff" stroke="#aaa" stroke-width="0.7"/>
  <text x="677" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">Dataset B</text>

  <!-- Note about Z -->
  <text x="677" y="398" text-anchor="middle" font-family="sans-serif" font-size="10" font-style="italic" fill="#999">Z has no match — ignored</text>

</svg>
