id: collection_creates_pair_y
name: collection_creates_pair_y
class: GalaxyTool
version: 1.0
shell_command:
  >
    sed 'n;d' '$input1' > '$paired_output.forward';
    sed -n 'g;n;p' '$input1' > '$paired_output.reverse';
inputs:
- name: input1
  type: data
  label: Input
  help: Input to be split.
outputs:
  paired_output:
    type: collection
    collection_type: paired
    label: Split Pair
tests:
- inputs:
    input1:
      class: File
      path: simple_lines_interleaved.txt
  outputs:
    paired_output:
      class: Collection
      collection_type: paired
      elements:
        forward:
          asserts:
          - that: has_text
            text: "This is a line of text.\nThis is a line of text."
        reverse:
          asserts:
          - that: has_text
            text: "This is a different line of text.\nThis is a different line of text."
