- doc: |
    Test to verify filter null tool keeps non-null datasets.
  job:
    input_collection:
      class: Collection
      collection_type: list
      elements:
        - identifier: first
          class: File
          contents: "abc"
    when: true
  outputs:
    out:
      class: Collection
      collection_type: list
      element_count: 1
- doc: |
    Test to verify filter null tool discards null datasets.
  job:
    input_collection:
      class: Collection
      collection_type: list
      elements:
        - identifier: first
          class: File
          contents: "abc"
    when: false
  outputs:
    out:
      class: Collection
      collection_type: list
      element_count: 0
