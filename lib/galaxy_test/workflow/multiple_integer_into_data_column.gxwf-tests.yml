- doc: |
    Test to verify text parameter can be connected to data column param
  job:
    input:
      class: File
      path: 2.tabular
      filetype: tabular
    column:
      value: [1, 2]
      type: raw
  outputs:
    output:
      class: File
      asserts:
        - that: has_text
          text: "col 1,2"
