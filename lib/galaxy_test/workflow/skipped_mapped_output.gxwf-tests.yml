- doc: |
    Mapped conditional with mixed true/false: executed elements have real
    content, skipped elements are expression.json null placeholders.
  job:
    boolean_input_files:
      type: collection
      collection_type: list
      elements:
        - identifier: run_me
          content: "true"
        - identifier: skip_me
          content: "false"
  outputs:
    out:
      class: Collection
      collection_type: list
      elements:
        run_me:
          asserts:
          - that: has_text
            text: "true"
        skip_me:
          ftype: expression.json
          asserts:
          - that: has_text
            text: "null"
