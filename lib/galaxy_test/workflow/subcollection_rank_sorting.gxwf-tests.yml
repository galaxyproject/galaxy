- doc: |
    Test to verify a tool that takes in a list or nested list is sent the most
    specific list possible during workflow execution (the nested list). This should
    not trigger subcollection mapping.
  job:
    input:
      class: Collection
      collection_type: list:list
      elements:
        - identifier: test_level_1
          class: Collection
          elements:
            - identifier: data1
              class: File
              contents: "TestData123"
            - identifier: data2
              class: File
              contents: "TestData123"
            - identifier: data3
              class: File
              contents: "TestData123"
  outputs:
    out:
      asserts:
      - that: has_text
        text: "Nested List"
- doc: |
    Once again with mapping, should reduce the result into a flat list.
  job:
    input:
      class: Collection
      collection_type: list:list:list
      elements:
        - identifier: test_level_2
          class: Collection
          elements:
            - identifier: test_level_1
              class: Collection
              elements:
                - identifier: data1
                  class: File
                  contents: "TestData123"
                - identifier: data2
                  class: File
                  contents: "TestData123"
                - identifier: data3
                  class: File
                  contents: "TestData123"
  outputs:
    out:
      class: Collection
      collection_type: list
      elements:
        test_level_2:
          asserts:
            - that: has_line
              line: "Nested List"
            - that: has_line
              line: "identifier is test_level_1"

- doc: |
    A test case with two levels of mapping. The inner two levels should be consumed and the outer
    two levels should be mapped over.
  job:
    input:
      class: Collection
      collection_type: list:list:list:list
      elements:
        - identifier: test_level_3
          class: Collection
          elements:
            - identifier: test_level_2
              class: Collection
              elements:
                - identifier: test_level_1
                  class: Collection
                  elements:
                    - identifier: data1
                      class: File
                      contents: "TestData123"
                    - identifier: data2
                      class: File
                      contents: "TestData123"
                    - identifier: data3
                      class: File
                      contents: "TestData123"
  outputs:
    out:
      class: Collection
      collection_type: list:list
      elements:
        test_level_3:
          class: Collection
          elements:
            test_level_2:
              asserts:
                - that: has_text
                  text: "Nested List"
                - that: has_line
                  line: "identifier is test_level_1"
