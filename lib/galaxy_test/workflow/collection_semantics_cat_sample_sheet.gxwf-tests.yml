- doc: |
    SAMPLE_SHEET_MATCHES_SAMPLE_SHEET: A sample_sheet consumed by a sample_sheet
    collection input (identity match, reduction).
  job:
    input1:
      class: Collection
      collection_type: sample_sheet
      rows:
        el1: []
        el2: []
      elements:
        - identifier: el1
          class: File
          contents: "element 1"
        - identifier: el2
          class: File
          contents: "element 2"
  outputs:
    wf_output:
      asserts:
        - that: has_text
          text: "el1"
        - that: has_text
          text: "el2"
