- doc: |
    Test splitting a list:paired_or_unpaired collection with mixed paired
    and unpaired elements into separate paired and unpaired output collections.
  job:
    input_collection:
      class: Collection
      collection_type: list:paired_or_unpaired
      elements:
        - identifier: el1
          class: Collection
          collection_type: paired_or_unpaired
          elements:
            - identifier: forward
              class: File
              contents: "forward content"
            - identifier: reverse
              class: File
              contents: "reverse content"
        - identifier: el2
          class: Collection
          collection_type: paired_or_unpaired
          elements:
            - identifier: unpaired
              class: File
              contents: "unpaired content"
  outputs:
    output_unpaired:
      class: Collection
      collection_type: list
      elements:
        el2:
          asserts:
            - that: has_text
              text: "unpaired content"
    output_paired:
      class: Collection
      collection_type: list:paired
      elements:
        el1:
          class: Collection
          elements:
            forward:
              asserts:
                - that: has_text
                  text: "forward content"
            reverse:
              asserts:
                - that: has_text
                  text: "reverse content"
