- doc: |
    Skip propagates through a 3-step data chain. When step1 is skipped,
    step2 and step3 also produce expression.json null — tools do not
    process the null placeholder as a literal file.
  job:
    input_file:
      type: File
      value: 1.fasta
    should_run:
      type: raw
      value: false
  outputs:
    out_step1:
      class: File
      ftype: expression.json
      asserts:
      - that: has_text
        text: "null"
    out_step2:
      class: File
      ftype: expression.json
      asserts:
      - that: has_text
        text: "null"
    out_step3:
      class: File
      ftype: expression.json
      asserts:
      - that: has_text
        text: "null"
- doc: |
    All steps execute normally when should_run=true.
  job:
    input_file:
      type: File
      value: 1.fasta
    should_run:
      type: raw
      value: true
  outputs:
    out_step1:
      class: File
      asserts:
      - that: has_size
        min: 1
    out_step2:
      class: File
      asserts:
      - that: has_size
        min: 1
    out_step3:
      class: File
      asserts:
      - that: has_size
        min: 1
