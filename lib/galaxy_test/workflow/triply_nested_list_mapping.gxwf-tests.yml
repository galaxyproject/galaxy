- doc: |
    Test that a basic list:list:list parameter is consumed directly by the tool
    and not mapped over.
  job:
    input:
      class: Collection
      collection_type: list:list:list
      elements:
        - identifier: test_level_2
          class: Collection
          elements:
            - identifier: test_level_1
              class: Collection
              elements:
                - identifier: data1
                  class: File
                  contents: "TestData123"
                - identifier: data2
                  class: File
                  contents: "TestData123"
                - identifier: data3
                  class: File
                  contents: "TestData123"
  outputs:
    out:
      asserts:
      - that: has_text
        text: "identifier is test_level_2"
      - that: has_text
        text: "collection_type<list:list>"

- doc: |
    Test that mapping over a list:list:list input parameter.
  job:
    input:
      class: Collection
      collection_type: list:list:list:list
      elements:
        - identifier: test_level_3
          class: Collection
          elements:
            - identifier: test_level_2
              class: Collection
              elements:
                - identifier: test_level_1
                  class: Collection
                  elements:
                    - identifier: data1
                      class: File
                      contents: "TestData123"
                    - identifier: data2
                      class: File
                      contents: "TestData123"
                    - identifier: data3
                      class: File
                      contents: "TestData123"
  outputs:
    out:
      class: Collection
      collection_type: list
      elements:
        test_level_3:
          asserts:
          - that: has_text
            text: "identifier is test_level_2"
          - that: has_text
            text: "collection_type<list:list>"
