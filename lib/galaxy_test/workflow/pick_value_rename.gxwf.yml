class: GalaxyWorkflow
inputs:
  input_data:
    type: data
  when:
    type: boolean
outputs:
  picked:
    outputSource: pick/output
steps:
  branch:
    tool_id: cat
    in:
      input1:
        source: input_data
      when:
        source: when
    when: $(inputs.when)
  pick:
    type: pick_value
    in:
      input_0:
        source: branch/out_file1
    state:
      mode: first_or_skip
    out:
      output:
        rename: "picked_result"
