- doc: |
    Skipped step (when=false) produces a hidden expression.json null dataset
    as its workflow output.
  job:
    input_file:
      type: File
      value: 1.fasta
    should_run:
      type: raw
      value: false
  outputs:
    out:
      class: File
      ftype: expression.json
      visible: false
      asserts:
      - that: has_text
        text: "null"
- doc: |
    Executed step (when=true) produces a visible dataset with real content.
  job:
    input_file:
      type: File
      value: 1.fasta
    should_run:
      type: raw
      value: true
  outputs:
    out:
      class: File
      visible: true
      asserts:
      - that: has_size
        min: 1
