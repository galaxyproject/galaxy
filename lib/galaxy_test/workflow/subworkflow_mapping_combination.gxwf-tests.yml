- doc: |
    Parent maps list_a over subworkflow data input, subworkflow maps
    list_b internally. Output is flat list from the inner mapping axis,
    not list:list. Two independent mapping sources do not stack.
  job:
    list_a:
      type: collection
      collection_type: list
      elements:
        - identifier: X
          content: "from_X"
        - identifier: Y
          content: "from_Y"
    list_b:
      type: collection
      collection_type: list
      elements:
        - identifier: P
          content: "P_content"
        - identifier: Q
          content: "Q_content"
  outputs:
    combined_out:
      class: Collection
      collection_type: list
      elements:
        P:
          asserts:
          - that: has_text
            text: "P_content"
        Q:
          asserts:
          - that: has_text
            text: "Q_content"
