- doc: |
    Null propagates through intermediate cat step. pick_value receives
    null as first input and selects fallback_file (1.bed with chr1).
  job:
    input_file:
      type: File
      value: 1.fasta
    fallback_file:
      type: File
      value: 1.bed
    should_run:
      type: raw
      value: false
  outputs:
    pick_out:
      class: File
      asserts:
      - that: has_text
        text: "chr1"
- doc: |
    All steps execute normally. pick_value picks the first (real) input.
  job:
    input_file:
      type: File
      value: 1.fasta
    fallback_file:
      type: File
      value: 1.bed
    should_run:
      type: raw
      value: true
  outputs:
    pick_out:
      class: File
      asserts:
      - that: has_size
        min: 1
