- doc: |
    Omitted optional text param produces null at every hop in a 3-step
    expression tool chain. All outputs are expression.json null.
  job: {}
  outputs:
    out_step1:
      class: File
      ftype: expression.json
      asserts:
      - that: has_text
        text: "null"
    out_step2:
      class: File
      ftype: expression.json
      asserts:
      - that: has_text
        text: "null"
    out_step3:
      class: File
      ftype: expression.json
      asserts:
      - that: has_text
        text: "null"
- doc: |
    Provided text param passes through all three steps unchanged.
  job:
    optional_text:
      type: raw
      value: hello_world
  outputs:
    out_step1:
      class: File
      asserts:
      - that: has_text
        text: "hello_world"
    out_step2:
      class: File
      asserts:
      - that: has_text
        text: "hello_world"
    out_step3:
      class: File
      asserts:
      - that: has_text
        text: "hello_world"
