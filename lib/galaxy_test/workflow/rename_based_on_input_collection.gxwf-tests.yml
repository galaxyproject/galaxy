- doc: |
    Test output dataset renaming when the target basename is based on an input collection.
  job:
    fasta_input:
      class: File
      path: 1.fasta
      name: fasta1
      filetype: fasta
    fastq_inputs:
      class: Collection
      collection_type: list
      name: the_dataset_pair
      elements:
        - identifier: forward
          class: File
          path: 1.fastq
        - identifier: reverse
          class: File
          path: 1.fastq
  outputs:
    output:
      class: File
      metadata:
        name: 'the_dataset_pair suffix'
