- doc: |
    Test to verify collection operations like the sort tool work fine with empty collections.
  job:
    input:
      class: Collection
      collection_type: list
      elements:
      - identifier: i1
        class: File
        contents: "0"
    filter_file:
      class: File
      contents: "i1"
  outputs:
    output:
      class: Collection
      collection_type: list
      elements:
        i1:
          asserts:
          - that: has_text
            text: "0"
